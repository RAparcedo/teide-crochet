<!doctype html>
<!-- Legacy redirector: product.html?id=<key> now lives at /toys/<key>.html
     (and /es/toys/<key>.html). Kept so old shared links keep working. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Stitchnotbitch</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script>
    (function () {
      var id = new URLSearchParams(location.search).get("id");
      var lang = "en";
      try { if (localStorage.getItem("stitch-lang") === "es") lang = "es"; } catch (e) {}
      var prefix = lang === "es" ? "/es" : "";
      if (id && /^[a-z][a-z-]*$/.test(id)) {
        location.replace(prefix + "/toys/" + id + ".html");
      } else {
        location.replace(lang === "es" ? "/es/" : "/");
      }
    })();
  </script>
</head>
<body>
  <p><a href="/">Stitchnotbitch — meet the friends</a></p>
</body>
</html>
