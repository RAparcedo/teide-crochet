<!doctype html>
<!-- Stitchnotbitch product detail page. JS-driven by ?id=<key>. Bilingual EN/ES
     (shares the main site's language via localStorage 'stitch-lang'). Each friend's
     dimensions / extra photos / Etsy link get filled as Joanna provides them. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FCF7F2" />
  <title>Stitchnotbitch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Caveat:wght@600;700&family=Nunito:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root{ --paper:#FCF7F2; --blush:#F7DEE3; --blush-soft:#FBEEF0; --blush-deep:#F2C9D2; --pink:#E58AA0; --pink-deep:#D26F89;
      --ink:#5E4A52; --ink-soft:rgba(94,74,82,.66); --ink-faint:rgba(94,74,82,.42); --hairline:rgba(94,74,82,.13);
      --font-display:"Quicksand",system-ui,sans-serif; --font-script:"Caveat",cursive; --font-body:"Nunito",system-ui,sans-serif;
      --gutter:clamp(1.25rem,5vw,4rem); }
    *,*::before,*::after{box-sizing:border-box;}
    body{margin:0;min-height:100vh;color:var(--ink);font-family:var(--font-body);font-size:1.02rem;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;
      background:#F6ECF3 linear-gradient(180deg, #F4C6D6 0%, #F8D2C0 16%, #FBE7C0 32%, #E2ECC4 50%, #C1E4DF 66%, #C4D6F1 82%, #F6ECF3 100%);}
    img{display:block;max-width:100%;} a{color:inherit;text-decoration:none;} h1,p{margin:0;}
    .wrap{max-width:64rem;margin:0 auto;padding:0 var(--gutter);}
    .mark{font-family:var(--font-display);font-weight:700;font-size:1.42rem;color:var(--ink);display:inline-flex;align-items:baseline;gap:0.12em;white-space:nowrap;}
    .mark .script{font-family:var(--font-script);color:var(--pink-deep);font-size:1.5em;line-height:0;transform:translateY(.06em) rotate(-6deg);}
    .btn{display:inline-flex;align-items:center;gap:.5ch;font-family:var(--font-display);font-weight:700;font-size:.92rem;padding:.9rem 1.7rem;border-radius:999px;border:2px solid transparent;min-height:3rem;cursor:pointer;transition:transform .18s,background .18s,color .18s,border-color .18s;}
    .btn--fill{background:var(--pink);color:#fff;box-shadow:0 8px 20px rgba(226,138,160,.32);} .btn--fill:hover{background:var(--pink-deep);transform:translateY(-2px);}
    .masthead{position:sticky;top:0;z-index:20;background:rgba(252,247,242,.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--hairline);}
    .masthead__in{display:flex;align-items:center;justify-content:space-between;gap:1rem;height:4.4rem;}
    .masthead__right{display:inline-flex;align-items:center;gap:.7rem;}
    .masthead .btn{padding:.55rem 1.1rem;min-height:2.4rem;font-size:.8rem;white-space:nowrap;}
    .langtoggle{display:inline-flex;border:1px solid var(--blush-deep);border-radius:999px;overflow:hidden;font-family:var(--font-display);font-size:.7rem;font-weight:700;letter-spacing:.1em;}
    .langtoggle button{padding:.4rem .62rem;background:transparent;border:0;color:var(--ink-soft);font:inherit;cursor:pointer;transition:background .2s,color .2s;}
    .langtoggle button+button{border-left:1px solid var(--blush-deep);}
    .langtoggle button[aria-current="true"]{background:var(--pink);color:#fff;}
    @media(max-width:30rem){.mark{font-size:1.2rem;}.masthead .btn{padding:.5rem .8rem;font-size:.74rem;}}
    .product{padding:clamp(2rem,5vw,3.5rem) 0 clamp(3rem,6vw,5rem);}
    .product__grid{display:grid;grid-template-columns:1fr;gap:clamp(1.5rem,4vw,3rem);align-items:start;}
    @media(min-width:50rem){.product__grid{grid-template-columns:1fr 1fr;}}
    .product__media{border-radius:22px;overflow:hidden;background:var(--blush-soft);box-shadow:0 18px 40px rgba(94,74,82,.14);border:5px solid #fff;}
    .product__media img{width:100%;height:auto;}
    .product__thumbs{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.9rem;}
    .product__thumbs button{padding:0;border:3px solid transparent;border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;width:74px;height:74px;box-shadow:0 6px 16px rgba(94,74,82,.10);transition:border-color .18s,transform .18s;}
    .product__thumbs button:hover{transform:translateY(-2px);}
    .product__thumbs button[aria-current="true"]{border-color:var(--pink);}
    .product__thumbs img{width:100%;height:100%;object-fit:cover;}
    .back{display:inline-block;font-family:var(--font-display);font-weight:600;font-size:.9rem;color:var(--pink-deep);margin-bottom:1rem;}
    .back:hover{color:var(--ink);}
    .product__name{font-family:var(--font-display);font-weight:700;font-size:clamp(2rem,5vw,3rem);line-height:1.05;color:var(--ink);}
    .product__dims{font-family:var(--font-display);font-weight:600;color:var(--pink-deep);margin-top:.8rem;}
    .product__desc{color:var(--ink-soft);margin-top:1rem;max-width:42ch;}
    .product__cta{margin-top:1.6rem;}
    .product__note{color:var(--ink-faint);font-size:.82rem;margin-top:1.2rem;max-width:38ch;}
    .foot{border-top:1px solid var(--hairline);padding:2rem 0;text-align:center;color:var(--ink-faint);font-size:.78rem;}
  </style>
</head>
<body>
  <header class="masthead">
    <div class="wrap masthead__in">
      <a class="mark" href="index.html">Stitch<span class="script">not</span>bitch</a>
      <div class="masthead__right">
        <div class="langtoggle" role="group" aria-label="Language · Idioma">
          <button type="button" data-lang-set="en">EN</button>
          <button type="button" data-lang-set="es">ES</button>
        </div>
        <a class="btn btn--fill" id="navEtsy" href="#" data-c="shop">Shop on Etsy</a>
      </div>
    </div>
  </header>

  <main class="product">
    <div class="wrap product__grid">
      <div>
        <figure class="product__media"><img id="pImg" src="" alt="" /></figure>
        <div class="product__thumbs" id="pThumbs"></div>
      </div>
      <div class="product__info">
        <a class="back" href="index.html#friends" data-c="back">← All the friends</a>
        <h1 class="product__name" id="pName"></h1>
        <p class="product__dims" id="pDims"></p>
        <p class="product__desc" id="pDesc"></p>
        <div class="product__cta"><a class="btn btn--fill" id="pEtsy" href="#" data-c="shop">Shop on Etsy</a></div>
        <p class="product__note" id="pNote" data-c="note"></p>
      </div>
    </div>
  </main>

  <footer class="foot"><div class="wrap">Stitchnotbitch · <span data-c="sample">Tenerife</span></div></footer>

  <script>
    // Each friend mirrors her live Etsy listing — real photos, real shop link.
    var PRODUCTS = {
      sheep: { gallery:["photos/p/sheep/cover.jpg","photos/p/sheep/01.jpg","photos/p/sheep/02.jpg","photos/p/sheep/03.jpg"], dims:"30 cm",
        name:{en:"Baa Baa Black Sheep", es:"Baa Baa Black Sheep"},
        desc:{en:"A 30 cm handmade sheep with a little bell on a pink ribbon. Made with soft baby yarn — safe and gentle, and ready to love. The perfect gift for any occasion.",
              es:"Una oveja de 30 cm hecha a mano con una campanita en una cinta rosa. Hecha con hilo suave para bebés — segura y tierna, lista para querer. El regalo perfecto para cualquier ocasión."},
        etsy:"https://www.etsy.com/listing/4521180929/baa-baa-black-sheep-crochet-toy-handmade" },
      giraffe: { gallery:["photos/p/giraffe/cover.jpg","photos/p/giraffe/01.jpg","photos/p/giraffe/02.jpg","photos/p/giraffe/03.jpg"],
        name:{en:"Gerry the Giraffe", es:"Gerry la Jirafa"},
        desc:{en:"Gerry — a handmade amigurumi giraffe with a cheerful yellow coat. A friendly safari friend for the nursery, and a sweet baby-shower gift.",
              es:"Gerry — una jirafa amigurumi hecha a mano con un alegre pelaje amarillo. Un amiguito de safari para el cuarto del bebé y un dulce regalo para baby shower."},
        etsy:"https://www.etsy.com/listing/4530575666/gerry-the-crochet-giraffe-handmade" },
      dragon: { gallery:["photos/p/dragon/cover.jpg","photos/p/dragon/01.jpg","photos/p/dragon/02.jpg","photos/p/dragon/03.jpg"],
        name:{en:"Dragon", es:"Dragón"},
        desc:{en:"A handmade crochet dragon with little wings — brave, colourful and ready for adventures. Each one is completely one of a kind.",
              es:"Un dragón de crochet hecho a mano con alitas — valiente, colorido y listo para aventuras. Cada uno es completamente único."},
        etsy:"https://www.etsy.com/listing/4530545397/crochet-dragon-amigurumi-toy" },
      "thin-lizzie": { gallery:["photos/p/thin-lizzie/cover.jpg","photos/p/thin-lizzie/01.jpg","photos/p/thin-lizzie/02.jpg","photos/p/thin-lizzie/03.jpg"], dims:"25 cm",
        name:{en:"Thin Lizzie", es:"Thin Lizzie"},
        desc:{en:"A 25 cm handmade amigurumi doll in a soft bamboo, silk & cashmere blend. An heirloom-quality friend — lovely as nursery decor or a special gift for a little one.",
              es:"Una muñeca amigurumi de 25 cm hecha a mano en una mezcla suave de bambú, seda y cachemir. Una amiga de calidad para toda la vida — preciosa como decoración o un regalo especial."},
        etsy:"https://www.etsy.com/listing/4526130897/thin-lizzie-crochet-doll-25-cm-amigurumi" },
      dolly: { gallery:["photos/p/dolly/cover.jpg","photos/p/dolly/01.jpg","photos/p/dolly/02.jpg"],
        name:{en:"Dolly Daydream", es:"Dolly Daydream"},
        desc:{en:"A sweet handmade crochet dolly with her own little outfit — soft, huggable and entirely one of a kind.",
              es:"Una dulce muñeca de crochet hecha a mano con su propio conjunto — suave, achuchable y completamente única."},
        etsy:"https://www.etsy.com/listing/4526086281/dolly-daydream-crochet-dolly" },
      pig: { gallery:["photos/p/pig/cover.jpg","photos/p/pig/01.jpg","photos/p/pig/02.jpg"], dims:"30 cm",
        name:{en:"Love Pig", es:"Cerdito Love"},
        desc:{en:"A 30 cm handmade crochet pig in a soft bamboo, silk & cashmere blend, holding a little love heart. A cuddly, cute gift for the nursery.",
              es:"Un cerdito de crochet de 30 cm hecho a mano en una mezcla suave de bambú, seda y cachemir, con un corazoncito. Un regalo tierno y adorable para el cuarto del bebé."},
        etsy:"https://www.etsy.com/listing/4525415509/handmade-crochet-pig-plush-toy-30-cm" },
      bunny: { gallery:["photos/p/bunny/cover.jpg","photos/p/bunny/01.jpg"],
        name:{en:"Candy Bunny", es:"Conejito Candy"},
        desc:{en:"A soft pastel candy bunny rabbit, handmade and ready for hugs. Each one is unique.",
              es:"Un suave conejito en tonos pastel, hecho a mano y listo para abrazos. Cada uno es único."},
        etsy:"https://www.etsy.com/listing/4525079899/pastel-candy-bunny-rabbit" },
      lion: { gallery:["photos/p/lion/cover.jpg","photos/p/lion/01.jpg","photos/p/lion/02.jpg","photos/p/lion/03.jpg","photos/p/lion/04.jpg"],
        name:{en:"Lion", es:"León"},
        desc:{en:"A handmade crochet lion cuddly toy with a soft mane — brave, friendly and very huggable.",
              es:"Un león de crochet hecho a mano con una melena suave — valiente, simpático y muy achuchable."},
        etsy:"https://www.etsy.com/listing/4525075694/handmade-crochet-lion-cuddly-toy" },
      teddy: { gallery:["photos/p/teddy/cover.jpg","photos/p/teddy/01.jpg","photos/p/teddy/02.jpg"],
        name:{en:"Blue Teddy", es:"Osito Azul"},
        desc:{en:"A classic handmade blue teddy bear, soft and cuddly — a friend to keep for years.",
              es:"Un clásico osito azul hecho a mano, suave y achuchable — un amigo para guardar durante años."},
        etsy:"https://www.etsy.com/listing/4522119453/blue-teddy-bear" },
      snail: { gallery:["photos/p/snail/cover.jpg","photos/p/snail/01.jpg","photos/p/snail/02.jpg","photos/p/snail/03.jpg"],
        name:{en:"Snail", es:"Caracol"},
        desc:{en:"A handmade crochet snail — a soft baby & Montessori counting toy for early learning and sensory play. Gentle, colourful and fun.",
              es:"Un caracol de crochet hecho a mano — un suave juguete para bebés y de conteo Montessori para el aprendizaje temprano y el juego sensorial. Tierno, colorido y divertido."},
        etsy:"https://www.etsy.com/listing/4522109193/crochet-snail-toy-montessori-counting" }
    };
    var DESC_DEFAULT = {
      en:"A one-of-a-kind handmade friend, crocheted with love. Each little character is unique — there's only one like it.",
      es:"Un amigo único hecho a mano, tejido con amor. Cada personaje es irrepetible — no hay otro igual."
    };
    var CHROME = {
      en:{ shop:"Shop on Etsy", back:"← All the friends", dimsLabel:"Approx. size", sample:"Tenerife",
           note:"Each friend is one of a kind — when it's gone, it's gone. Tap through to see it on Etsy.", notFound:"Friend not found." },
      es:{ shop:"Comprar en Etsy", back:"← Todos los amiguitos", dimsLabel:"Tamaño aprox.", sample:"Tenerife",
           note:"Cada amiguito es único — cuando se va, se va. Toca para verlo en Etsy.", notFound:"Amiguito no encontrado." }
    };
    function getLang(){ try{ var l=localStorage.getItem("stitch-lang"); return (l==="es")?"es":"en"; }catch(e){ return "en"; } }
    function render(){
      var l=getLang(); document.documentElement.lang=l; var c=CHROME[l];
      document.querySelectorAll("[data-c]").forEach(function(el){ var k=el.getAttribute("data-c"); if(c[k]!=null) el.textContent=c[k]; });
      document.querySelectorAll("[data-lang-set]").forEach(function(b){ b.setAttribute("aria-current", b.getAttribute("data-lang-set")===l?"true":"false"); });
      var id=new URLSearchParams(location.search).get("id");
      var p=PRODUCTS[id];
      if(!p){ document.getElementById("pName").textContent=c.notFound; document.getElementById("pImg").style.display="none"; return; }
      var gal=p.gallery||[p.photo]; var img=document.getElementById("pImg");
      img.src=gal[0]; img.alt=p.name[l];
      var thumbs=document.getElementById("pThumbs"); thumbs.innerHTML="";
      if(gal.length>1){
        gal.forEach(function(src,idx){
          var b=document.createElement("button"); b.type="button";
          b.setAttribute("aria-label",p.name[l]+" — photo "+(idx+1));
          b.setAttribute("aria-current", idx===0?"true":"false");
          var ti=document.createElement("img"); ti.src=src; ti.alt=""; ti.loading="lazy"; b.appendChild(ti);
          b.addEventListener("click",function(){
            img.src=src;
            thumbs.querySelectorAll("button").forEach(function(x){x.setAttribute("aria-current","false");});
            b.setAttribute("aria-current","true");
          });
          thumbs.appendChild(b);
        });
      }
      document.getElementById("pName").textContent=p.name[l];
      document.getElementById("pDesc").textContent=(p.desc&&p.desc[l])?p.desc[l]:DESC_DEFAULT[l];
      var dims=document.getElementById("pDims");
      if(p.dims){ dims.textContent=c.dimsLabel+": "+p.dims; dims.style.display=""; } else { dims.style.display="none"; }
      var etsy=p.etsy||"https://www.etsy.com/shop/stitchnotbitch";
      ["pEtsy","navEtsy"].forEach(function(id){ var a=document.getElementById(id); a.href=etsy; a.target="_blank"; a.rel="noopener"; });
      document.title=p.name[l]+" · Stitchnotbitch";
    }
    document.querySelectorAll("[data-lang-set]").forEach(function(b){
      b.addEventListener("click",function(){ try{ localStorage.setItem("stitch-lang", b.getAttribute("data-lang-set")); }catch(e){} render(); });
    });
    render();
  </script>
</body>
</html>
