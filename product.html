<!doctype html>
<!-- Stitchnotbitch product detail page. JS-driven by ?id=<key>. Bilingual EN/ES
     (shares the main site's language via localStorage 'stitch-lang'). Each friend's
     dimensions / extra photos / Etsy link get filled as Joanna provides them. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#FCF7F2" />
  <title>Stitchnotbitch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Caveat:wght@600;700&family=Nunito:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root{ --paper:#FCF7F2; --blush:#F7DEE3; --blush-soft:#FBEEF0; --blush-deep:#F2C9D2; --pink:#E58AA0; --pink-deep:#D26F89;
      --ink:#5E4A52; --ink-soft:rgba(94,74,82,.66); --ink-faint:rgba(94,74,82,.42); --hairline:rgba(94,74,82,.13);
      --font-display:"Quicksand",system-ui,sans-serif; --font-script:"Caveat",cursive; --font-body:"Nunito",system-ui,sans-serif;
      --gutter:clamp(1.25rem,5vw,4rem); }
    *,*::before,*::after{box-sizing:border-box;}
    body{margin:0;min-height:100vh;color:var(--ink);font-family:var(--font-body);font-size:1.02rem;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;
      background:#F6ECF3 linear-gradient(180deg, #F4C6D6 0%, #F8D2C0 16%, #FBE7C0 32%, #E2ECC4 50%, #C1E4DF 66%, #C4D6F1 82%, #F6ECF3 100%);}
    img{display:block;max-width:100%;} a{color:inherit;text-decoration:none;} h1,p{margin:0;}
    .wrap{max-width:64rem;margin:0 auto;padding:0 var(--gutter);}
    .mark{font-family:var(--font-display);font-weight:700;font-size:1.42rem;color:var(--ink);display:inline-flex;align-items:baseline;gap:0.12em;white-space:nowrap;}
    .mark .script{font-family:var(--font-script);color:var(--pink-deep);font-size:1.5em;line-height:0;transform:translateY(.06em) rotate(-6deg);}
    .btn{display:inline-flex;align-items:center;gap:.5ch;font-family:var(--font-display);font-weight:700;font-size:.92rem;padding:.9rem 1.7rem;border-radius:999px;border:2px solid transparent;min-height:3rem;cursor:pointer;transition:transform .18s,background .18s,color .18s,border-color .18s;}
    .btn--fill{background:var(--pink);color:#fff;box-shadow:0 8px 20px rgba(226,138,160,.32);} .btn--fill:hover{background:var(--pink-deep);transform:translateY(-2px);}
    .masthead{position:sticky;top:0;z-index:20;background:rgba(252,247,242,.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--hairline);}
    .masthead__in{display:flex;align-items:center;justify-content:space-between;gap:1rem;height:4.4rem;}
    .masthead__right{display:inline-flex;align-items:center;gap:.7rem;}
    .masthead .btn{padding:.55rem 1.1rem;min-height:2.4rem;font-size:.8rem;white-space:nowrap;}
    .langtoggle{display:inline-flex;border:1px solid var(--blush-deep);border-radius:999px;overflow:hidden;font-family:var(--font-display);font-size:.7rem;font-weight:700;letter-spacing:.1em;}
    .langtoggle button{padding:.4rem .62rem;background:transparent;border:0;color:var(--ink-soft);font:inherit;cursor:pointer;transition:background .2s,color .2s;}
    .langtoggle button+button{border-left:1px solid var(--blush-deep);}
    .langtoggle button[aria-current="true"]{background:var(--pink);color:#fff;}
    @media(max-width:30rem){.mark{font-size:1.2rem;}.masthead .btn{padding:.5rem .8rem;font-size:.74rem;}}
    .product{padding:clamp(2rem,5vw,3.5rem) 0 clamp(3rem,6vw,5rem);}
    .product__grid{display:grid;grid-template-columns:1fr;gap:clamp(1.5rem,4vw,3rem);align-items:start;}
    @media(min-width:50rem){.product__grid{grid-template-columns:1fr 1fr;}}
    .product__media{border-radius:22px;overflow:hidden;background:var(--blush-soft);box-shadow:0 18px 40px rgba(94,74,82,.14);border:5px solid #fff;}
    .product__media img{width:100%;height:auto;}
    .back{display:inline-block;font-family:var(--font-display);font-weight:600;font-size:.9rem;color:var(--pink-deep);margin-bottom:1rem;}
    .back:hover{color:var(--ink);}
    .product__name{font-family:var(--font-display);font-weight:700;font-size:clamp(2rem,5vw,3rem);line-height:1.05;color:var(--ink);}
    .product__dims{font-family:var(--font-display);font-weight:600;color:var(--pink-deep);margin-top:.8rem;}
    .product__desc{color:var(--ink-soft);margin-top:1rem;max-width:42ch;}
    .product__cta{margin-top:1.6rem;}
    .product__note{color:var(--ink-faint);font-size:.82rem;margin-top:1.2rem;max-width:38ch;}
    .foot{border-top:1px solid var(--hairline);padding:2rem 0;text-align:center;color:var(--ink-faint);font-size:.78rem;}
  </style>
</head>
<body>
  <header class="masthead">
    <div class="wrap masthead__in">
      <a class="mark" href="index.html">Stitch<span class="script">not</span>bitch</a>
      <div class="masthead__right">
        <div class="langtoggle" role="group" aria-label="Language · Idioma">
          <button type="button" data-lang-set="en">EN</button>
          <button type="button" data-lang-set="es">ES</button>
        </div>
        <a class="btn btn--fill" id="navEtsy" href="#" data-c="shop">Shop on Etsy</a>
      </div>
    </div>
  </header>

  <main class="product">
    <div class="wrap product__grid">
      <figure class="product__media"><img id="pImg" src="" alt="" /></figure>
      <div class="product__info">
        <a class="back" href="index.html#amigurumi" data-c="back">← All the friends</a>
        <h1 class="product__name" id="pName"></h1>
        <p class="product__dims" id="pDims"></p>
        <p class="product__desc" id="pDesc"></p>
        <div class="product__cta"><a class="btn btn--fill" id="pEtsy" href="#" data-c="shop">Shop on Etsy</a></div>
        <p class="product__note" id="pNote" data-c="note"></p>
      </div>
    </div>
  </main>

  <footer class="foot"><div class="wrap">Stitchnotbitch · <span data-c="sample">Sample site</span></div></footer>

  <script>
    var PRODUCTS = {
      sheep: { photo:"photos/baa-baa-sheep.jpg", dims:"30 cm",
        name:{en:"Baa Baa Black Sheep", es:"Baa Baa Black Sheep"},
        desc:{en:"A 30 cm handmade sheep with a little bell on a pink ribbon. Made with soft baby yarn — safe and gentle, and ready to love. The perfect gift for any occasion.",
              es:"Una oveja de 30 cm hecha a mano con una campanita en una cinta rosa. Hecha con hilo suave para bebés — segura y tierna, lista para querer. El regalo perfecto para cualquier ocasión."}, etsy:"#" },
      owl:{ photo:"photos/owl.jpg", name:{en:"Owl",es:"Búho"} },
      crab:{ photo:"photos/crab.jpg", name:{en:"Crab",es:"Cangrejo"} },
      frog:{ photo:"photos/frog.jpg", name:{en:"Frog",es:"Rana"} },
      bunny:{ photo:"photos/bunny.jpg", name:{en:"Bunny",es:"Conejito"} },
      pig:{ photo:"photos/pig.jpg", name:{en:"Piglet",es:"Cerdito"} },
      bear:{ photo:"photos/bear.jpg", name:{en:"Teddy bear",es:"Osito"} },
      lamb:{ photo:"photos/lamb.jpg", name:{en:"Little lamb",es:"Corderito"} },
      cat:{ photo:"photos/cat.jpg", name:{en:"Cat",es:"Gato"} },
      character:{ photo:"photos/character.jpg", name:{en:"Little friend",es:"Amiguito"} }
    };
    var DESC_DEFAULT = {
      en:"A one-of-a-kind handmade friend, crocheted with love. Each little character is unique — there's only one like it.",
      es:"Un amigo único hecho a mano, tejido con amor. Cada personaje es irrepetible — no hay otro igual."
    };
    var CHROME = {
      en:{ shop:"Shop on Etsy", back:"← All the friends", dimsLabel:"Approx. size", sample:"Sample site",
           note:"More photos & details coming soon — and you'll be able to buy this one right on Etsy.", notFound:"Friend not found." },
      es:{ shop:"Comprar en Etsy", back:"← Todos los amiguitos", dimsLabel:"Tamaño aprox.", sample:"Sitio de muestra",
           note:"Pronto más fotos y detalles — y podrás comprarlo directamente en Etsy.", notFound:"Amiguito no encontrado." }
    };
    function getLang(){ try{ var l=localStorage.getItem("stitch-lang"); return (l==="es")?"es":"en"; }catch(e){ return "en"; } }
    function render(){
      var l=getLang(); document.documentElement.lang=l; var c=CHROME[l];
      document.querySelectorAll("[data-c]").forEach(function(el){ var k=el.getAttribute("data-c"); if(c[k]!=null) el.textContent=c[k]; });
      document.querySelectorAll("[data-lang-set]").forEach(function(b){ b.setAttribute("aria-current", b.getAttribute("data-lang-set")===l?"true":"false"); });
      var id=new URLSearchParams(location.search).get("id");
      var p=PRODUCTS[id];
      if(!p){ document.getElementById("pName").textContent=c.notFound; document.getElementById("pImg").style.display="none"; return; }
      var img=document.getElementById("pImg"); img.src=p.photo; img.alt=p.name[l];
      document.getElementById("pName").textContent=p.name[l];
      document.getElementById("pDesc").textContent=(p.desc&&p.desc[l])?p.desc[l]:DESC_DEFAULT[l];
      var dims=document.getElementById("pDims");
      if(p.dims){ dims.textContent=c.dimsLabel+": "+p.dims; dims.style.display=""; } else { dims.style.display="none"; }
      var etsy=p.etsy||"#"; document.getElementById("pEtsy").href=etsy; document.getElementById("navEtsy").href=etsy;
      document.title=p.name[l]+" · Stitchnotbitch";
    }
    document.querySelectorAll("[data-lang-set]").forEach(function(b){
      b.addEventListener("click",function(){ try{ localStorage.setItem("stitch-lang", b.getAttribute("data-lang-set")); }catch(e){} render(); });
    });
    render();
  </script>
</body>
</html>
